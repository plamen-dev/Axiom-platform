# Capability Compatibility Matrix
#
# Tracks the validation status of each Axiom capability per Revit version.
# Statuses follow the VersionValidationStatus progression:
#   planned → simulated → build_validated → startup_validated → real_validated
#
# See: docs/architecture/revit-version-compatibility-strategy.md

capabilities:
  - capability: "CreateGrids"
    description: "Creates a grid system with vertical and horizontal grid lines."
    versions:
      - revit_version: "2024"
        status: "simulated"
        last_tested: null
        tested_by: null
        python_simulation: true
        csharp_build: false
        revit_startup: false
        revit_execution: false
        notes: >
          Python simulation passes (31/31 test cases). C# code exists and
          compiles against Revit 2024 API in Visual Studio. Real Revit
          validation pending Windows testing environment.
        known_issues:
          - "BUG-001: rows/columns without 'grid' keyword — resolved with clarification loop"
          - "BUG-002: mock count=0 validation — resolved, aligned with C#"

      - revit_version: "2025"
        status: "planned"
        last_tested: null
