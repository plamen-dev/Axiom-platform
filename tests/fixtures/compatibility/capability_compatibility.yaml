# Validation status reference
validation_statuses:
  - status: "planned"
    description: "Support intended but no work started for this version."

  - status: "simulated"
    description: "Python simulation passes. No Revit-version-specific testing done."

  - status: "build_validated"
    description: "C# compiles against this Revit version's API DLLs without errors."

  - status: "startup_validated"
    description: "Add-in loads in Revit without errors. Axiom tab appears."

  - status: "real_validated"
    description: "Capability executes correctly in Revit with a real model."

  - status: "failed"
    description: "Attempted validation failed. See notes and known_issues."

  - status: "deprecated"
    description: "No longer targeting this Revit version."

# Validation workflow per version
validation_workflow:
  steps:
    - order: 1
      name: "Python simulation"
      description: "Run pytest and capability harness in simulate mode."
      requires_revit: false

    - order: 2
      name: "C# build"
      description: "Build C# solution against version-specific RevitAPI.dll."
      requires_revit: false

    - order: 3
      name: "Revit startup"
      description: "Deploy add-in to Revit addins folder, launch Revit, verify add-in loads."
      requires_revit: true

    - order: 4
      name: "Capability smoke test"
      description: "Execute each capability via Prompt dialog on a test model."
      requires_revit: true

    - order: 5
      name: "InventoryModel scan"
      description: "Run InventoryModel on the test model to capture parameter surface."
      requires_revit: true

    - order: 6
      name: "Update metadata"
      description: "Update this fixture file with validation results."
      requires_revit: false
