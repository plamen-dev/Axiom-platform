# --------------------------------------------------------------------------
# Project/family/shared parameter examples (version-agnostic)
# --------------------------------------------------------------------------
version_agnostic_parameters:
  - name: "Fire Rating"
    type: "project_parameter"
    storage_type: "String"
    is_read_only: false
    notes: >
      Common project parameter. Not tied to any API version — defined in
      the Revit project. Will appear in any Revit version that opens the
      document. No version tracking needed.

  - name: "Assembly Code"
    type: "shared_parameter"
    storage_type: "String"
    is_read_only: false
    notes: >
      Common shared parameter (GUID-based). Version-independent — defined
      in a shared parameter file, not by the API. No version tracking needed.

  - name: "Cost"
    type: "family_parameter"
    storage_type: "Double"
    is_read_only: false
    notes: >
      Family parameter defined in the family editor. Version-independent.
      Exposed on instances/types of that family. No version tracking needed.

