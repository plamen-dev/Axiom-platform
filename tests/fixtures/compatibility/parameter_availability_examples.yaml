  # --- General identity parameters ---
  - name: "ALL_MODEL_MARK"
    built_in_id: "ALL_MODEL_MARK"
    category: "*"
    storage_type: "String"
    is_read_only: false
    parameter_group: "PG_IDENTITY_DATA"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
