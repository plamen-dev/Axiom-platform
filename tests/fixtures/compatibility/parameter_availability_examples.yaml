    replacement: null
    source: "documented"
    notes: >
      Hypothetical example of a version-specific parameter. Illustrates how
      new parameters introduced in later Revit versions are flagged with
      limited available_versions. This specific parameter has NOT been
      confirmed — it is included as a fixture format example only.

  # --- Example: deprecated parameter (hypothetical) ---
  - name: "ROOM_AREA_LEGACY"
    built_in_id: "ROOM_AREA_LEGACY"
    category: "Rooms"
    storage_type: "Double"
    is_read_only: true
