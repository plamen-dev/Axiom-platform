# Parameter Availability Examples
#
# Representative examples of Revit parameters and their known version availability.
# This is NOT an exhaustive registry — it contains examples across parameter
# categories to establish the fixture format for future InventoryModel-driven
# population.
#
# See: docs/architecture/revit-parameter-versioning-strategy.md

# --------------------------------------------------------------------------
# Built-in parameters — API-defined, stable across most versions
# --------------------------------------------------------------------------
parameters:
  # --- Grid-related built-in parameters ---
  - name: "CURVE_ELEM_LENGTH"
    built_in_id: "CURVE_ELEM_LENGTH"
    category: "Grids"
    storage_type: "Double"
    is_read_only: true
    parameter_group: "PG_GEOMETRY"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
    replacement: null
    source: "documented"
    notes: "Length of linear elements (grids, lines, walls). Extremely stable."

  - name: "DATUM_TEXT"
    built_in_id: "DATUM_TEXT"
    category: "Grids"
    storage_type: "String"
    is_read_only: false
    parameter_group: "PG_IDENTITY_DATA"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
    replacement: null
    source: "documented"
    notes: "Grid line name/label. Writable — used to rename grid lines."

  # --- Level-related built-in parameters ---
  - name: "LEVEL_ELEV"
    built_in_id: "LEVEL_ELEV"
    category: "Levels"
    storage_type: "Double"
    is_read_only: false
    parameter_group: "PG_CONSTRAINTS"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
    replacement: null
    source: "documented"
    notes: "Level elevation in project units. Core level parameter."

  - name: "LEVEL_NAME"
    built_in_id: "LEVEL_NAME"
    category: "Levels"
    storage_type: "String"
    is_read_only: false
    parameter_group: "PG_IDENTITY_DATA"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
    replacement: null
    source: "documented"
    notes: "Level display name."

  # --- Wall-related built-in parameters ---
  - name: "HOST_AREA_COMPUTED"
    built_in_id: "HOST_AREA_COMPUTED"
    category: "Walls"
    storage_type: "Double"
    is_read_only: true
    parameter_group: "PG_GEOMETRY"
    available_versions: ["2024", "2025", "2026", "2027"]
    deprecated_versions: []
    replacement: null
    source: "documented"
    notes: "Computed area of host elements (walls, floors, roofs)."

  - name: "WALL_BASE_CONSTRAINT"
    built_in_id: "WALL_BASE_CONSTRAINT"
